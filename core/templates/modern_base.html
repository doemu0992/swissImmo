<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwissImmo SaaS Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script defer src="https://cdn.jsdelivr.net/npm/@imacws/alpine-ajax@0.10.2/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px;
            background: #1e293b;
            min-height: 100vh;
            position: fixed;
            top: 0; left: 0;
            color: white;
            padding: 20px;
            z-index: 1000;
        }
        .brand {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            text-decoration: none;
        }
        .nav-link {
            color: #94a3b8;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            text-decoration: none;
            font-weight: 500;
        }
        .nav-link:hover, .nav-link.active {
            background: #334155;
            color: white;
            transform: translateX(5px);
        }
        .nav-link i { font-size: 1.2rem; }

        .nav-label {
            text-transform: uppercase;
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 25px;
            margin-bottom: 10px;
            padding-left: 15px;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            margin-left: 260px;
            padding: 30px;
        }

        /* Lade-Indikator für Alpine AJAX */
        [x-sync] { transition: opacity 0.2s ease; }
        .ajax-loading [x-sync] { opacity: 0.5; pointer-events: none; }

        @media (max-width: 992px) {
            .sidebar { width: 70px; padding: 20px 10px; }
            .nav-link span, .brand span, .nav-label { display: none; }
            .main-content { margin-left: 70px; }
            .nav-link { justify-content: center; }
        }
    </style>
</head>
<body x-data @ajax:before="document.body.classList.add('ajax-loading')" @ajax:success="document.body.classList.remove('ajax-loading')" @ajax:error="document.body.classList.remove('ajax-loading')">

    <nav class="sidebar">
        <a href="{% url 'admin_dashboard' %}" class="brand">
            <i class="bi bi-buildings-fill"></i>
            <span>SwissImmo</span>
        </a>

        <div class="nav-label">SaaS Portal (Neu)</div>

        <a href="{% url 'liegenschaft_liste' %}" x-target="main-content" class="nav-link text-info font-bold">
            <i class="bi bi-rocket-takeoff"></i> <span>Liegenschaften</span>
        </a>

        <a href="{% url 'mieter_liste' %}" x-target="main-content" class="nav-link text-info font-bold">
            <i class="bi bi-people"></i> <span>Mieter</span>
        </a>

        <a href="{% url 'mietvertrag_liste' %}" x-target="main-content" class="nav-link text-info font-bold">
            <i class="bi bi-file-text"></i> <span>Verträge</span>
        </a>

        <a href="{% url 'ticket_liste' %}" x-target="main-content" class="nav-link text-info font-bold">
            <i class="bi bi-tools"></i> <span>Tickets</span>
        </a>

        <a href="{% url 'abrechnung_liste' %}" x-target="main-content" class="nav-link text-info font-bold">
            <i class="bi bi-calculator"></i> <span>Abrechnungen</span>
        </a>

        <div class="nav-label">Klassisches Backend</div>
        <a href="{% url 'admin:portfolio_einheit_changelist' %}" class="nav-link">
            <i class="bi bi-door-open"></i> <span>Einheiten</span>
        </a>

        <div class="nav-label">System</div>
        <a href="{% url 'admin_dashboard' %}" class="nav-link">
            <i class="bi bi-speedometer2"></i> <span>Admin-Cockpit</span>
        </a>
        <form method="post" action="{% url 'admin:logout' %}">
            {% csrf_token %}
            <button type="submit" class="nav-link" style="color:#ef4444; background:none; border:none; width:100%; text-align:left;">
                <i class="bi bi-box-arrow-left"></i> <span>Abmelden</span>
            </button>
        </form>
    </nav>

    <div class="main-content" id="main-content" x-sync>
        {% block content %}
        {% endblock %}

        {% block dashboard_content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
