<script>
    const chartDataLabels = {{ chart_labels|safe|default:"[]" }};
    const chartDataIst = {{ chart_ist|safe|default:"[]" }};
    const chartDataSoll = {{ chart_soll|safe|default:"[]" }};

    const clickOutside = {
        beforeMount: (el, binding) => {
            el.clickOutsideEvent = event => { if (!(el == event.target || el.contains(event.target))) { binding.value(); } };
            document.addEventListener("click", el.clickOutsideEvent);
        },
        unmounted: el => { document.removeEventListener("click", el.clickOutsideEvent); },
    };

    const { createApp } = Vue
    createApp({
        directives: { 'click-outside': clickOutside },
        data() {
            return {
                activeTab: 'home',
                financeTab: 'debitoren', // 🔥 NEU: Initialer Tab für Finanzen
                loading: true,
                liegenschaften: [], vertraege: [], mieter: [], tickets: [], zahlungen: [], mietzinsKontrolle: [],
                showPanel: false, panelType: '', selectedItem: null,
                selectedLiegenschaft: null, selectedEinheit: null,

                // CRM
                selectedMieter: null,
                showNewMieterModal: false,
                crmSearchQuery: '',
                newMieterData: { typ: 'person', vorname: '', nachname: '', firmen_name: '', email: '' },

                // RENTALS (Verträge)
                selectedVertrag: null,
                showNewRentModal: false,
                rentSearchQuery: '',
                unitPreview: null,
                wizardStep: 1,

                newRentData: {
                    mieter_id: null,
                    einheit_id: null,
                    beginn: new Date().toISOString().split('T')[0],
                    erstmals_kuendbar_auf: null,
                    netto_mietzins: 0,
                    nebenkosten: 0,
                    nk_abrechnungsart: 'akonto',
                    zahlungsrhythmus: 'monatlich',
                    kautions_betrag: 0,
                    kuendigungsfrist_monate: 3,
                    kuendigungstermine: 'Ende jedes Monats ausser Dezember',
                    basis_referenzzinssatz: 0,
                    basis_lik_punkte: 0,
                    familienwohnung: false,
                    mitmieter_name: '',
                    anzahl_personen: 1,
                    besondere_vereinbarungen: '',
                    ausgeschlossene_kosten: '',
                    kostensteigerung_datum: new Date().toISOString().split('T')[0],
                    mietzinsreserve_betrag: null,
                    mietzinsreserve_prozent: null,
                    weitere_vorbehalte: ''
                },

                showPropModal: false, showMieterModal: false, showEditMieterModal: false, showPaymentModal: false, showEditRentModal: false,
                showDeviceModal: false, showEditDeviceModal: false, showZaehlerModal: false, showSchluesselModal: false, showUnterhaltModal: false,
                showDocModal: false, showLiegenschaftEditModal: false, showLinkModal: false,
                showEinheitModal: false,

                showVerteilschluesselModal: false,
                showLiegStdModal: false,

                toasts: [], searchQuery: '', showSearch: false, chartInstance: null,

                newProp: { strasse: '', plz: '', ort: '' },
                newZahlung: { vertrag_id: null, betrag: 0, datum_eingang: new Date().toISOString().split('T')[0], buchungs_monat: new Date().toISOString().split('T')[0], bemerkung: '' },
                newDevice: { liegenschaft_id: null, einheit_id: null, kategorie: 'kuehlschrank', sonstiges_bezeichnung: '', marke: '', modell: '', installations_datum: '', garantie_bis: '' },
                newZaehler: { einheit_id: null, typ: 'strom', zaehler_nummer: '', aktueller_stand: 0 },
                newSchluessel: { einheit_id: null, typ: 'Wohnung', schluessel_nummer: '', anzahl: 3 },
                newUnterhalt: { einheit_id: null, titel: '', beschreibung: '', datum: new Date().toISOString().split('T')[0], kosten: 0 },
                newDoc: { liegenschaft_id: null, einheit_id: null, mieter_id: null, titel: '', kategorie: 'Allgemein' },
                linkData: { hauptobjekt_id: null, nebenobjekt_id: null },

                newEinheit: { liegenschaft_id: null, bezeichnung: '', typ: 'whg', etage: '', zimmer: null },

                newVerteilschluessel: { einheit_id: null, kostenart: 'heizung', typ: 'm2', wert: 0, gueltig_ab: new Date().toISOString().split('T')[0], notizen: '' },
                newLiegStd: { liegenschaft_id: null, kostenart: 'heizung', typ: 'm2', wert: 0, gueltig_ab: new Date().toISOString().split('T')[0], notizen: '' },

                editDeviceData: null, editMieterData: null, editRentData: null, editLiegenschaftData: null, newTicketMessage: '',

                // 🔥 HIER SIND DIE SAUBEREN TITEL FÜR DIE TOP-BAR
                tabTitles: { home: 'Cockpit', portfolio: 'Liegenschaften', rentals: 'Verträge', crm: 'Mieterstamm', finance: 'Finanzen', tickets: 'Ticket-Board' },
                tabSubtitles: { home: 'Portfolio-Performance im Überblick', portfolio: 'Objekte und Wohneinheiten verwalten', rentals: 'Aktive und zukünftige Mietverhältnisse', crm: 'Zentrale Mieterdatenbank', finance: 'Zahlungsverkehr, Nebenkosten & Buchhaltung', tickets: 'Schadensmeldungen bearbeiten' }
            }
        },
        computed: {
            filteredMieter() {
                if (!this.crmSearchQuery) return this.mieter;
                const q = this.crmSearchQuery.toLowerCase();
                return this.mieter.filter(m => (m.display_name && m.display_name.toLowerCase().includes(q)) || (m.email && m.email.toLowerCase().includes(q)));
            },
            filteredVertraege() {
                if (!this.rentSearchQuery) return this.vertraege;
                const q = this.rentSearchQuery.toLowerCase();
                return this.vertraege.filter(v =>
                    (v.mieter_name && v.mieter_name.toLowerCase().includes(q)) ||
                    (v.einheit_name && v.einheit_name.toLowerCase().includes(q))
                );
            },
            availableNebenobjekte() {
                if (!this.selectedLiegenschaft || !this.selectedEinheit) return [];
                return this.selectedLiegenschaft.einheiten.filter(e => e.id !== this.selectedEinheit.id && !e.gehoert_zu && ['pp', 'gar', 'bas', 'gew'].includes(e.typ));
            },
            ticketsNeu() { return this.tickets.filter(t => t.status === 'neu'); },
            ticketsInBearbeitung() { return this.tickets.filter(t => ['in_bearbeitung', 'warte_auf_mieter'].includes(t.status)); },
            ticketsErledigt() { return this.tickets.filter(t => t.status === 'erledigt').slice(0, 20); },
            searchResults() {
                if (this.searchQuery.length < 2) return { mieter: [], objekte: [], tickets: [] };
                const q = this.searchQuery.toLowerCase();
                return {
                    mieter: this.mieter.filter(m => m.display_name.toLowerCase().includes(q) || (m.email && m.email.toLowerCase().includes(q))).slice(0, 5),
                    objekte: this.liegenschaften.filter(l => l.strasse.toLowerCase().includes(q) || l.ort.toLowerCase().includes(q)).slice(0, 5),
                    tickets: this.tickets.filter(t => t.titel.toLowerCase().includes(q) || (t.liegenschaft_name && t.liegenschaft_name.toLowerCase().includes(q))).slice(0, 5)
                };
            }
        },
        mounted() {
            this.refreshAll();
            if(this.activeTab === 'home') this.initChart();
            window.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('global-search-input').focus(); this.showSearch = true; }
                if (e.key === 'Escape') { this.showSearch = false; this.searchQuery = ''; }
            });
        },
        methods: {
            getCsrf() { return document.querySelector('[name=csrfmiddlewaretoken]').value; },
            switchTab(t) {
                this.activeTab = t;
                this.selectedEinheit = null; this.selectedLiegenschaft = null; this.selectedMieter = null; this.selectedVertrag = null;
                this.closePanel(); if(t === 'home') this.initChart();
            },

            async refreshAll() {
                this.loading = true;
                try {
                    const [l, v, m, t, z, k] = await Promise.all([
                        fetch('/api/portfolio/liegenschaften'), fetch('/api/rentals/vertraege'),
                        fetch('/api/crm/mieter'), fetch('/api/tickets/'),
                        fetch('/api/finance/zahlungen'), fetch('/api/finance/mietzins-kontrolle')
                    ]);
                    this.liegenschaften = await l.json(); this.vertraege = await v.json();
                    this.mieter = await m.json(); this.tickets = await t.json();
                    this.zahlungen = await z.json(); this.mietzinsKontrolle = await k.json();
                } catch(e) { console.error(e); } finally { this.loading = false; }
            },

            // ==========================================
            // 🔥 RENTALS (Verträge) & DOCUSEAL
            // ==========================================
            openContractWizard() {
                this.wizardStep = 1;
                this.unitPreview = null;
                this.newRentData = {
                    mieter_id: null,
                    einheit_id: null,
                    beginn: new Date().toISOString().split('T')[0],
                    erstmals_kuendbar_auf: null,
                    netto_mietzins: 0,
                    nebenkosten: 0,
                    nk_abrechnungsart: 'akonto',
                    zahlungsrhythmus: 'monatlich',
                    kautions_betrag: 0,
                    kuendigungsfrist_monate: 3,
                    kuendigungstermine: 'Ende jedes Monats ausser Dezember',
                    basis_referenzzinssatz: 0,
                    basis_lik_punkte: 0,
                    familienwohnung: false,
                    mitmieter_name: '',
                    anzahl_personen: 1,
                    besondere_vereinbarungen: '',
                    ausgeschlossene_kosten: '',
                    kostensteigerung_datum: new Date().toISOString().split('T')[0],
                    mietzinsreserve_betrag: null,
                    mietzinsreserve_prozent: null,
                    weitere_vorbehalte: ''
                };
                this.showNewRentModal = true;
            },

            async onUnitSelectedForContract() {
                if (!this.newRentData.einheit_id) {
                    this.unitPreview = null;
                    return;
                }
                this.loading = true;
                try {
                    const res = await fetch(`/api/portfolio/einheiten/${this.newRentData.einheit_id}`);
                    if (res.ok) {
                        const unit = await res.json();
                        this.unitPreview = unit;

                        this.newRentData.netto_mietzins = unit.nettomiete_aktuell;
                        this.newRentData.nebenkosten = unit.nebenkosten_aktuell;
                        this.newRentData.nk_abrechnungsart = unit.nk_abrechnungsart || 'akonto';

                        const monate = unit.standard_kautionsmonate || 3;
                        this.newRentData.kautions_betrag = unit.nettomiete_aktuell * monate;
                    }

                    const basisRes = await fetch('/api/crm/basiswerte');
                    if (basisRes.ok) {
                        const basis = await basisRes.json();
                        this.newRentData.basis_referenzzinssatz = basis.ref_zins;
                        this.newRentData.basis_lik_punkte = basis.lik_punkte;
                    }
                    this.addToast("Objekt-Daten geladen!");
                } catch(e) {
                    console.error(e);
                    this.addToast("Fehler beim Laden der Vorschau.", "error");
                } finally {
                    this.loading = false;
                }
            },
            async openVertragDeepDive(v) {
                this.loading = true;
                try {
                    const res = await fetch(`/api/rentals/vertraege/${v.id}`);
                    if(res.ok) { this.selectedVertrag = await res.json(); }
                } catch(e) {} finally { this.loading = false; }
            },
            async saveNewVertrag() {
                try {
                    const res = await fetch(`/api/rentals/vertraege`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() },
                        body: JSON.stringify(this.newRentData)
                    });
                    if(res.ok) {
                        this.showNewRentModal = false;
                        this.unitPreview = null;
                        this.openContractWizard(); // Reset
                        this.showNewRentModal = false; // Wieder schliessen
                        this.addToast("Vertrag erfolgreich erstellt!");
                        this.refreshAll();
                    } else { alert("Fehler beim Erstellen des Vertrags."); }
                } catch(e) {}
            },
            async saveVertragEdit() {
                const payload = { ...this.selectedVertrag };
                if(!payload.ende) payload.ende = null;
                if(!payload.erstmals_kuendbar_auf) payload.erstmals_kuendbar_auf = null;
                if(!payload.kostensteigerung_datum) payload.kostensteigerung_datum = null;
                if(!payload.kautions_einbezahlt_am) payload.kautions_einbezahlt_am = null;
                try {
                    const res = await fetch(`/api/rentals/vertraege/${this.selectedVertrag.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() },
                        body: JSON.stringify(payload)
                    });
                    if(res.ok) {
                        this.addToast("Vertrag erfolgreich aktualisiert!");
                        this.refreshAll();
                        this.openVertragDeepDive(this.selectedVertrag);
                    } else { alert("Fehler beim Speichern des Vertrags."); }
                } catch(e) {}
            },
            async deleteVertrag() {
                if(!confirm("Mietvertrag wirklich unwiderruflich löschen?")) return;
                try {
                    const res = await fetch(`/api/rentals/vertraege/${this.selectedVertrag.id}`, {
                        method: 'DELETE',
                        headers: { 'X-CSRFToken': this.getCsrf() }
                    });
                    if(res.ok) {
                        this.addToast("Vertrag gelöscht.");
                        this.selectedVertrag = null;
                        this.refreshAll();
                    }
                } catch(e) {}
            },
            async triggerDocuSeal(id) {
                if(!confirm("Vertrag jetzt zur digitalen Signatur an DocuSeal senden?")) return;
                const res = await fetch(`/api/rentals/vertraege/${id}/send-docuseal`, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': this.getCsrf() }
                });
                if(res.ok) {
                    this.addToast("An DocuSeal übermittelt!");
                    this.openVertragDeepDive(this.selectedVertrag);
                }
            },

            // ==========================================
            // 🔥 CRM & QR-CODE
            // ==========================================
            async openMieterDeepDive(m) {
                this.loading = true;
                try { const res = await fetch(`/api/crm/mieter/${m.id}`); if(res.ok) { this.selectedMieter = await res.json(); } }
                catch(e) {} finally { this.loading = false; }
            },
            async saveNewMieter() {
                try {
                    const res = await fetch(`/api/crm/mieter`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() }, body: JSON.stringify(this.newMieterData) });
                    if(res.ok) { this.showNewMieterModal = false; this.newMieterData = { typ: 'person', vorname: '', nachname: '', firmen_name: '', email: '' }; this.addToast("Kontakt erstellt!"); this.refreshAll(); }
                } catch(e) {}
            },
            async saveMieterEdit() {
                const payload = { ...this.selectedMieter };
                if(!payload.geburtsdatum) payload.geburtsdatum = null;
                if(!payload.bonitaet_datum) payload.bonitaet_datum = null;
                try {
                    const res = await fetch(`/api/crm/mieter/${this.selectedMieter.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() }, body: JSON.stringify(payload) });
                    if(res.ok) { this.addToast("Kontakt gespeichert!"); this.refreshAll(); this.openMieterDeepDive(this.selectedMieter); }
                } catch(e) {}
            },
            async deleteMieter() {
                if(!confirm("Diesen Kontakt wirklich unwiderruflich löschen?")) return;
                try {
                    const res = await fetch(`/api/crm/mieter/${this.selectedMieter.id}`, { method: 'DELETE', headers: { 'X-CSRFToken': this.getCsrf() } });
                    if(res.ok) { this.addToast("Kontakt gelöscht."); this.selectedMieter = null; this.refreshAll(); }
                } catch(e) {}
            },
            async generateQR(id) {
                this.addToast("QR-Rechnung wird erstellt...");
                const res = await fetch(`/api/crm/mieter/${id}/qr-rechnung`);
                if(res.ok) {
                    const data = await res.json();
                    window.open(data.url, '_blank');
                    this.addToast("QR-PDF wurde im neuen Tab geöffnet.");
                }
            },

            // ==========================================
            // PORTFOLIO, TOOLS & UI
            // ==========================================
            openSearchResult(tab, item) { this.showSearch = false; this.searchQuery = ''; this.switchTab(tab); this.openPanel(tab, item); },
            async openPanel(type, item) {
                this.panelType = type; this.selectedItem = item; this.showPanel = true;
                const endpoint = type === 'tickets' ? `/api/tickets/${item.id}` : null;
                if(endpoint) {
                    this.loading = true;
                    try { const res = await fetch(endpoint); if(res.ok) { this.selectedItem = await res.json(); } } catch(e) {} finally { this.loading = false; }
                }
            },
            closePanel() { this.showPanel = false; },
            async openLiegenschaftDeepDive(l) {
                this.loading = true;
                try { const res = await fetch(`/api/portfolio/liegenschaften/${l.id}`); if(res.ok) { this.selectedLiegenschaft = await res.json(); } else { this.addToast("Fehler beim Laden.", "error"); } } catch(e) {} finally { this.loading = false; }
            },
            openEinheitDetail(liegenschaft, einheit) { this.selectedLiegenschaft = liegenschaft; this.selectedEinheit = einheit; this.closePanel(); window.scrollTo({ top: 0, behavior: 'smooth' }); },
            closeEinheit() { this.selectedEinheit = null; },
            async reloadEinheit() {
                const updateRes = await fetch(`/api/portfolio/liegenschaften/${this.selectedLiegenschaft.id}`);
                const updatedLiegenschaft = await updateRes.json();
                this.selectedLiegenschaft = updatedLiegenschaft;
                if (this.selectedEinheit) { this.selectedEinheit = updatedLiegenschaft.einheiten.find(e => e.id === this.selectedEinheit.id); }
            },
            async saveNewEinheit() {
                const payload = { bezeichnung: this.newEinheit.bezeichnung || 'Neues Objekt', typ: this.newEinheit.typ || 'whg', etage: this.newEinheit.etage || '', zimmer: this.newEinheit.zimmer ? parseFloat(this.newEinheit.zimmer) : null };
                const res = await fetch(`/api/portfolio/liegenschaften/${this.newEinheit.liegenschaft_id}/einheiten`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() }, body: JSON.stringify(payload) });
                if(res.ok) { this.showEinheitModal = false; this.newEinheit = { liegenschaft_id: null, bezeichnung: '', typ: 'whg', etage: '', zimmer: null }; this.addToast("Objekt erstellt!"); this.reloadEinheit(); }
            },
            async saveEinheitEdit() {
                const payload = { ...this.selectedEinheit };
                const res = await fetch(`/api/portfolio/einheiten/${this.selectedEinheit.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() }, body: JSON.stringify(payload) });
                if(res.ok) { this.addToast("Objekt gespeichert!"); this.reloadEinheit(); }
            },
            async deleteEinheit(id) {
                if(!confirm("Objekt wirklich löschen?")) return;
                const res = await fetch(`/api/portfolio/einheiten/${id}`, { method: 'DELETE', headers: { 'X-CSRFToken': this.getCsrf() } });
                if(res.ok) { this.addToast("Gelöscht."); this.selectedEinheit = null; this.reloadEinheit(); }
            },
            async saveLiegenschaftEdit() {
                const payload = { ...this.selectedLiegenschaft };
                const res = await fetch(`/api/portfolio/liegenschaften/${this.selectedLiegenschaft.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() }, body: JSON.stringify(payload) });
                if(res.ok) { this.addToast("Gespeichert!"); this.refreshAll(); this.openLiegenschaftDeepDive(this.selectedLiegenschaft); }
            },

            // ==========================================
            // 🔥 VERTEILSCHLÜSSEL API LOGIK
            // ==========================================
            async saveVerteilschluessel() {
                const res = await fetch('/api/portfolio/verteilschluessel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() },
                    body: JSON.stringify(this.newVerteilschluessel)
                });
                if(res.ok) {
                    this.showVerteilschluesselModal = false;
                    this.addToast("Verteilschlüssel gespeichert!");
                    this.newVerteilschluessel = { einheit_id: null, kostenart: 'heizung', typ: 'm2', wert: 0, gueltig_ab: new Date().toISOString().split('T')[0], notizen: '' };
                    this.reloadEinheit();
                } else {
                    this.addToast("Fehler beim Speichern.", "error");
                }
            },
            async deleteVerteilschluessel(id) {
                if(!confirm("Diesen Verteilschlüssel löschen?")) return;
                const res = await fetch(`/api/portfolio/verteilschluessel/${id}`, {
                    method: 'DELETE',
                    headers: { 'X-CSRFToken': this.getCsrf() }
                });
                if(res.ok) {
                    this.addToast("Verteilschlüssel gelöscht!");
                    this.reloadEinheit();
                }
            },

            async saveLiegStd() {
                try {
                    const res = await fetch('/api/portfolio/liegenschaft-verteilschluessel', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': this.getCsrf()
                        },
                        body: JSON.stringify(this.newLiegStd)
                    });

                    if(res.ok) {
                        this.showLiegStdModal = false;
                        this.addToast("Standard-Regel erfolgreich gespeichert!");

                        this.newLiegStd = {
                            liegenschaft_id: null,
                            kostenart: 'heizung',
                            typ: 'm2',
                            wert: 0,
                            gueltig_ab: new Date().toISOString().split('T')[0],
                            notizen: ''
                        };
                        this.openLiegenschaftDeepDive(this.selectedLiegenschaft);
                    } else {
                        const errorData = await res.json();
                        console.error("Speicherfehler:", errorData);
                        this.addToast("Fehler beim Speichern der Regel.", "error");
                    }
                } catch (e) {
                    console.error(e);
                    this.addToast("Systemfehler beim Speichern.", "error");
                }
            },
            async deleteLiegStd(id) {
                if(!confirm("Standard-Regel wirklich löschen?")) return;
                const res = await fetch(`/api/portfolio/liegenschaft-verteilschluessel/${id}`, {
                    method: 'DELETE',
                    headers: { 'X-CSRFToken': this.getCsrf() }
                });
                if(res.ok) {
                    this.addToast("Regel gelöscht!");
                    this.openLiegenschaftDeepDive(this.selectedLiegenschaft);
                }
            },

            // ==========================================
            // 🔥 DOKUMENTE
            // ==========================================
            async uploadDokument() {
                const formData = new FormData();
                formData.append('titel', this.newDoc.titel); formData.append('kategorie', this.newDoc.kategorie);
                if (this.newDoc.liegenschaft_id) formData.append('liegenschaft_id', this.newDoc.liegenschaft_id);
                if (this.newDoc.einheit_id) formData.append('einheit_id', this.newDoc.einheit_id);

                if (this.selectedMieter && this.activeTab === 'crm') {
                    formData.append('mieter_id', this.selectedMieter.id);
                }

                formData.append('datei', this.$refs.fileInput.files[0]);
                const res = await fetch('/api/portfolio/dokumente', { method: 'POST', headers: { 'X-CSRFToken': this.getCsrf() }, body: formData });

                if(res.ok) {
                    this.showDocModal = false;
                    this.addToast("Upload erfolgreich!");

                    if (this.activeTab === 'crm' && this.selectedMieter) {
                        this.openMieterDeepDive(this.selectedMieter);
                    } else if (this.selectedEinheit) {
                        this.reloadEinheit();
                    } else if (this.selectedLiegenschaft) {
                        this.openLiegenschaftDeepDive(this.selectedLiegenschaft);
                    }
                }
            },

            async deleteDokument(id, is_vertrag = false) {
                if (is_vertrag) {
                    const check = window.prompt("ACHTUNG: Offizielles Vertragsdokument!\n\nTippe LÖSCHEN ein, um es endgültig zu entfernen:");
                    if (check !== "LÖSCHEN") return;
                } else {
                    if (!window.confirm("Dokument wirklich löschen?")) return;
                }

                const endpoint = (this.activeTab === 'crm' && this.selectedMieter)
                    ? `/api/crm/dokumente/${id}`
                    : `/api/portfolio/dokumente/${id}`;

                try {
                    const res = await fetch(endpoint, {
                        method: 'DELETE',
                        headers: { 'X-CSRFToken': this.getCsrf() }
                    });

                    if (res.ok) {
                        this.addToast("Erfolgreich gelöscht.");

                        if (this.activeTab === 'crm' && this.selectedMieter) {
                            this.openMieterDeepDive(this.selectedMieter);
                        } else if (this.selectedEinheit) {
                            this.reloadEinheit();
                        } else if (this.selectedLiegenschaft) {
                            this.openLiegenschaftDeepDive(this.selectedLiegenschaft);
                        }
                    } else {
                        this.addToast("Fehler beim Löschen.", "error");
                    }
                } catch(e) {
                    console.error(e);
                    this.addToast("Systemfehler beim Löschen.", "error");
                }
            },

            async saveDevice() {
                const p = { ...this.newDevice }; if(!p.einheit_id) delete p.einheit_id; if(!p.liegenschaft_id) delete p.liegenschaft_id;
                const res = await fetch('/api/portfolio/geraete', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() }, body: JSON.stringify(p) });
                if(res.ok) { this.showDeviceModal = false; this.addToast("Gerät erfasst!"); if(this.selectedEinheit) this.reloadEinheit(); else this.openLiegenschaftDeepDive(this.selectedLiegenschaft); }
            },
            async deleteDevice(id) {
                if(!confirm("Gerät löschen?")) return;
                await fetch(`/api/portfolio/geraete/${id}`, { method: 'DELETE', headers: { 'X-CSRFToken': this.getCsrf() } });
                if(this.selectedEinheit) this.reloadEinheit(); else this.openLiegenschaftDeepDive(this.selectedLiegenschaft);
            },
            downloadFile(url) { window.open(url, '_blank'); },
            async triggerAction(url) {
                this.loading = true; const res = await fetch(url); if(res.ok) { this.addToast("Erfolgreich!"); this.refreshAll(); } else { this.addToast("Fehler!", "error"); } this.loading = false;
            },
            handleDelete() {
                if(!confirm("Wirklich löschen?")) return;
                let url = this.panelType === 'tickets' ? `/api/tickets/${this.selectedItem.id}` : null;
                if(url) fetch(url, { method: 'DELETE', headers: { 'X-CSRFToken': this.getCsrf() } }).then(res => { if(res.ok) { this.addToast("Gelöscht."); this.closePanel(); this.refreshAll(); } });
            },
            async updateTicketStatus(id, s) {
                await fetch(`/api/tickets/${id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() },
                    body: JSON.stringify({ status: s })
                });
                this.addToast("Status OK.");
                this.refreshAll();
                this.closePanel();
            },
            async saveZahlung() {
                const res = await fetch('/api/finance/zahlungen', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': this.getCsrf() }, body: JSON.stringify(this.newZahlung) });
                if(res.ok) { this.showPaymentModal = false; this.addToast("Verbucht!"); this.refreshAll(); }
            },

            // 🔥 NEU: Mahnbrief generieren
            async generateMahnung(vertragId, offenerBetrag) {
                this.addToast("Mahnbrief wird generiert...");
                try {
                    const res = await fetch(`/api/finance/mahnung/${vertragId}?offener_betrag=${offenerBetrag}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data.success) {
                            window.open(data.url, '_blank');
                            this.addToast("Mahnung erfolgreich erstellt!", "success");
                        } else {
                            this.addToast(data.error || "Fehler bei der Erstellung", "error");
                        }
                    } else {
                        this.addToast("Serverfehler bei der Erstellung", "error");
                    }
                } catch(e) {
                    console.error(e);
                    this.addToast("Systemfehler", "error");
                }
            },

            addToast(msg, type = 'success') { const id = Date.now(); this.toasts.push({ id, msg, type }); setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 4000); },
            initChart() {
                this.$nextTick(() => {
                    const canvas = document.getElementById('revenueChart'); if (!canvas) return;
                    if (this.chartInstance) this.chartInstance.destroy();
                    const ctx = canvas.getContext('2d');
                    this.chartInstance = new Chart(ctx, {
                        type: 'bar',
                        data: { labels: chartDataLabels, datasets: [ { label: 'Ist', data: chartDataIst, backgroundColor: '#10b981', borderRadius: 10 }, { label: 'Soll', data: chartDataSoll, backgroundColor: '#f1f5f9', borderRadius: 10 } ] },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { borderDash: [4,4], color: '#f1f5f9' }, border: { display: false } }, x: { grid: { display: false } } } }
                    });
                });
            }
        }
    }).mount('#app');
</script>
