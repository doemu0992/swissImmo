<header class="h-24 min-h-[96px] px-10 flex items-center justify-between border-b border-slate-200 bg-white/50 backdrop-blur-md sticky top-0 z-40">
    <div class="w-1/4">
        <h1 class="text-2xl font-black tracking-tight">{% verbatim %}{{ tabTitles[activeTab] }}{% endverbatim %}</h1>
        <p class="text-xs text-slate-500 font-medium">{% verbatim %}{{ tabSubtitles[activeTab] }}{% endverbatim %}</p>
    </div>

    <div class="flex-1 max-w-xl mx-8 relative" v-click-outside="() => showSearch = false">
        <div class="relative group">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
            <input
                id="global-search-input"
                v-model="searchQuery"
                @focus="showSearch = true"
                type="text"
                placeholder="Suche nach Mietern, Objekten, Tickets..."
                class="w-full bg-white border border-slate-200 pl-12 pr-12 py-3 rounded-2xl text-sm font-medium focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all shadow-sm placeholder:text-slate-400"
            >
            <div class="absolute right-3 top-1/2 -translate-y-1/2 flex items-center gap-1 pointer-events-none opacity-50 group-focus-within:opacity-0 transition-opacity">
                <kbd class="bg-slate-100 border border-slate-200 px-1.5 py-0.5 rounded-md text-[10px] font-black text-slate-500 font-sans">⌘K</kbd>
            </div>
        </div>

        <div v-if="showSearch && searchQuery.length > 1" class="absolute top-full mt-2 w-full bg-white rounded-2xl shadow-2xl border border-slate-100 overflow-hidden z-[100] max-h-[60vh] overflow-y-auto">

            <div v-if="!searchResults.mieter.length && !searchResults.objekte.length && !searchResults.tickets.length" class="p-6 text-center text-slate-400 text-sm font-medium">
                Keine Ergebnisse für "{% verbatim %}{{ searchQuery }}{% endverbatim %}" gefunden.
            </div>

            <div v-if="searchResults.mieter.length > 0" class="p-2">
                <div class="px-3 py-2 text-[10px] font-black uppercase tracking-widest text-slate-400">Mieter</div>
                <button v-for="m in searchResults.mieter" :key="m.id" @click="openSearchResult('crm', m)" class="w-full text-left px-3 py-3 rounded-xl hover:bg-slate-50 flex items-center gap-3 transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 flex items-center justify-center"><i class="fa-solid fa-user text-xs"></i></div>
                    <div><div class="text-sm font-bold text-slate-900">{% verbatim %}{{ m.display_name }}{% endverbatim %}</div><div class="text-[10px] text-slate-500">{% verbatim %}{{ m.email || 'Keine E-Mail' }}{% endverbatim %}</div></div>
                </button>
            </div>

            <div v-if="searchResults.objekte.length > 0" class="p-2 border-t border-slate-50">
                <div class="px-3 py-2 text-[10px] font-black uppercase tracking-widest text-slate-400">Liegenschaften</div>
                <button v-for="l in searchResults.objekte" :key="l.id" @click="openSearchResult('portfolio', l)" class="w-full text-left px-3 py-3 rounded-xl hover:bg-slate-50 flex items-center gap-3 transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center"><i class="fa-solid fa-building text-xs"></i></div>
                    <div><div class="text-sm font-bold text-slate-900">{% verbatim %}{{ l.strasse }}{% endverbatim %}</div><div class="text-[10px] text-slate-500">{% verbatim %}{{ l.plz }} {{ l.ort }}{% endverbatim %}</div></div>
                </button>
            </div>

            <div v-if="searchResults.tickets.length > 0" class="p-2 border-t border-slate-50">
                <div class="px-3 py-2 text-[10px] font-black uppercase tracking-widest text-slate-400">Tickets</div>
                <button v-for="t in searchResults.tickets" :key="t.id" @click="openSearchResult('tickets', t)" class="w-full text-left px-3 py-3 rounded-xl hover:bg-slate-50 flex items-center gap-3 transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-rose-50 text-rose-600 flex items-center justify-center"><i class="fa-solid fa-ticket text-xs"></i></div>
                    <div><div class="text-sm font-bold text-slate-900">{% verbatim %}{{ t.titel }}{% endverbatim %}</div><div class="text-[10px] text-slate-500">{% verbatim %}{{ t.liegenschaft_name }}{% endverbatim %}</div></div>
                </button>
            </div>
        </div>
    </div>

    <div class="w-1/4 flex justify-end gap-3">
        <a v-if="activeTab === 'home'" href="/admin/update-marktdaten/" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg hover:bg-slate-800 transition-all"><i class="fa-solid fa-rotate mr-2"></i> Marktdaten Sync</a>
        <button v-if="activeTab === 'portfolio'" @click="showPropModal = true" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">+ Liegenschaft</button>
        <button v-if="activeTab === 'crm'" @click="showMieterModal = true" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all">+ Neuer Mieter</button>
        <button v-if="activeTab === 'finance'" @click="showPaymentModal = true" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition-all">+ Zahlung verbuchen</button>
    </div>
</header>
