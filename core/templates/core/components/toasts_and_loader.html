<div class="fixed top-6 right-6 z-[1000] flex flex-col gap-3">
    <transition-group name="toast">
        <div v-for="t in toasts" :key="t.id" :class="t.type === 'error' ? 'bg-rose-600' : 'bg-slate-900'" class="text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 min-w-[300px] border border-white/10">
            <i class="fa-solid" :class="t.type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'"></i>
            <span class="text-sm font-semibold">{% verbatim %}{{ t.msg }}{% endverbatim %}</span>
        </div>
    </transition-group>
</div>
<div v-if="loading" class="absolute inset-0 bg-white/60 backdrop-blur-sm flex items-center justify-center z-[100]">
    <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
</div>
